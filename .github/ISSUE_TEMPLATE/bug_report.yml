name: Bug Report
description: Something is broken
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Fill in as much as you can — it helps a lot.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: The app crashed when I...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      placeholder: I expected it to...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the Converter tab
        2. Type "SOS"
        3. Tap the share button
        4. App crashes
    validations:
      required: true

  - type: dropdown
    id: device
    attributes:
      label: Device
      options:
        - iPhone SE
        - iPhone 16
        - iPhone 16 Pro
        - iPhone 16 Pro Max
        - iPad
        - Simulator
        - Other
    validations:
      required: true

  - type: input
    id: ios-version
    attributes:
      label: iOS version
      placeholder: e.g. iOS 18.4
    validations:
      required: true

  - type: input
    id: app-version
    attributes:
      label: App version
      placeholder: e.g. v1.0
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or screen recording
      description: Drag and drop here if relevant.
    validations:
      required: false
